<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Time's Up</title>
    <link rel="stylesheet" href="blocked.css" />
  </head>
  <body>
    <div class="container">
      <div class="icon">&#x23F0;</div>
      <h1>Time's Up</h1>
      <p class="message">
        You've spent <strong id="spent"></strong> on
        <strong id="domain"></strong> today.
      </p>
      <p class="sub">
        That was your daily limit of <span id="limit"></span>.
      </p>
      <div class="actions">
        <button id="close-btn" class="btn btn-primary">Close Tab</button>
        <button id="extend-btn" class="btn btn-secondary">
          +5 Minutes <span id="remaining"></span>
        </button>
      </div>
    </div>
    <script src="blocked.js"></script>
  </body>
</html>
